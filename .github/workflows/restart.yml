name: Run Restart Script

on:
  schedule:
    # 每天北京时间早上 8 点和晚上 8 点自动运行
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许在 GitHub 页面上点击按钮手动触发

  # ── 核心修复：支持 Cloudflare Worker 远程 API 调用 ──
  repository_dispatch:
    types:
      - remote-restart-event # 必须与 Worker 里的 CONFIG.EVENT_TYPE 完全一致

jobs:
  restart-task:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        npm init -y
        npm install @playwright/test

    - name: Install Playwright Chromium Browser
      run: npx playwright install chromium --with-deps

    - name: Run Playwright Script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        TG_BOT: ${{ secrets.TG_BOT }}
      run: npx playwright test restart.spec.js
